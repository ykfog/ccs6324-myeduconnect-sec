events {
    worker_connections 1024;
}

http {
    server {
        listen 80; # VULNERABILITY: Listening on cleartext port 80. No SSL certificate configured.
        server_name localhost;

        location / {
            # VULNERABILITY: Traffic is passed to the backend via unencrypted HTTP
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Note: X-Forwarded-Proto is deliberately omitted to prevent 
            # the backend from verifying if the original request was secure.
        }
    }
}